<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Blondie Time</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f7f8;
        color: #16303a;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px 24px;
        border: 1px solid rgba(22, 48, 58, 0.14);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 20px 48px rgba(17, 34, 42, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: #c24e00;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Blondie Time</h1>
      <p id="status">Returning you to the active Blondie Time workspace...</p>
      <p id="manual-wrap" hidden>
        <a id="manual-link" href="#">Open Blondie Time manually</a>
      </p>
    </main>
    <script src="blondie-time-deeplink-bridge.js"></script>
  </body>
</html>
